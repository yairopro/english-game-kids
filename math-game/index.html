<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>אתגר החשבון (Calculation Quest)</title>

	<!-- Tailwind CSS -->
	<script src="https://cdn.tailwindcss.com"></script>

	<!-- React and ReactDOM -->
	<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
	<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

	<!-- Babel for in-browser JSX compilation -->
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

	<style>
		/* Custom simple animations for the UI */
		@keyframes zoom-in {
			from {
				transform: scale(0.95);
				opacity: 0;
			}

			to {
				transform: scale(1);
				opacity: 1;
			}
		}

		@keyframes fade-in {
			from {
				opacity: 0;
			}

			to {
				opacity: 1;
			}
		}

		.animate-in.zoom-in {
			animation: zoom-in 0.2s ease-out forwards;
		}

		.animate-in.fade-in {
			animation: fade-in 0.2s ease-out forwards;
		}
	</style>
</head>

<body class="bg-slate-100">
	<div id="root"></div>

	<script type="text/babel">
		const { useState, useEffect, useRef } = React;

		// --- ICON COMPONENTS ---
		// In a no-build environment, it's easiest to inline SVGs for our required icons
		const Calculator = ({ size = 24, className = "" }) => (
			<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2" /><line x1="8" x2="16" y1="6" y2="6" /><line x1="16" x2="16" y1="14" y2="18" /><path d="M16 10h.01" /><path d="M12 10h.01" /><path d="M8 10h.01" /><path d="M12 14h.01" /><path d="M8 14h.01" /><path d="M12 18h.01" /><path d="M8 18h.01" /></svg>
		);
		const CheckCircle2 = ({ size = 24, className = "" }) => (
			<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></svg>
		);
		const XCircle = ({ size = 24, className = "" }) => (
			<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><path d="m15 9-6 6" /><path d="m9 9 6 6" /></svg>
		);
		const ArrowRight = ({ size = 24, className = "" }) => (
			<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></svg>
		);
		const ArrowLeft = ({ size = 24, className = "" }) => (
			<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7" /><path d="M19 12H5" /></svg>
		);
		const Trophy = ({ size = 24, className = "" }) => (
			<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" /><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" /><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" /></svg>
		);
		const AlertCircle = ({ size = 24, className = "" }) => (
			<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><line x1="12" x2="12" y1="8" y2="12" /><line x1="12" x2="12.01" y1="16" y2="16" /></svg>
		);
		const Settings = ({ size = 24, className = "" }) => (
			<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></svg>
		);
		const X = ({ size = 24, className = "" }) => (
			<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
		);

		// --- UTILITIES & GAME LOGIC ---
		const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

		const generateProblem = (enabledOps = ['+', '-', '*', '/'], minRange = -50, maxRange = 50) => {
			// Ensure valid boundaries
			let safeMin = Math.min(minRange, maxRange);
			let safeMax = Math.max(minRange, maxRange);
			if (safeMin === safeMax) {
				safeMax = safeMin + 10;
			}

			const ops = enabledOps.length > 0 ? enabledOps : ['+', '-', '*', '/'];
			const op = ops[getRandomInt(0, ops.length - 1)];

			let n1, n2, answer;

			if (op === '/') {
				let attempts = 0;
				do {
					n2 = getRandomInt(safeMin, safeMax);
					attempts++;
					// Fallback to avoid infinite loop if range strictly forbids non-zeros
					if (attempts > 100 && n2 === 0) n2 = 1;
				} while (n2 === 0);

				let maxPossibleAnswer = Math.floor(safeMax / Math.abs(n2));
				let minPossibleAnswer = Math.ceil(safeMin / Math.abs(n2));

				if (minPossibleAnswer > maxPossibleAnswer) {
					const temp = minPossibleAnswer;
					minPossibleAnswer = maxPossibleAnswer;
					maxPossibleAnswer = temp;
				}

				answer = getRandomInt(minPossibleAnswer, maxPossibleAnswer);
				n1 = n2 * answer;
			} else {
				let valid = false;
				let attempts = 0;
				// Limit attempts so it doesn't infinite loop on impossible constraints
				while (!valid && attempts < 100) {
					attempts++;
					n1 = getRandomInt(safeMin, safeMax);
					n2 = getRandomInt(safeMin, safeMax);

					switch (op) {
						case '+': answer = n1 + n2; break;
						case '-': answer = n1 - n2; break;
						case '*': answer = n1 * n2; break;
						default: break;
					}

					if (answer >= safeMin && answer <= safeMax) {
						valid = true;
					}
				}
			}

			return { num1: n1, num2: n2, operation: op, correctAnswer: answer };
		};

		// --- COMPONENTS ---
		const ProblemDisplay = ({ num1, num2, operation }) => {
			let displayOp = operation;
			let displayNum2 = num2;

			if (operation === '+' && num2 < 0) {
				displayOp = '-';
				displayNum2 = Math.abs(num2);
			} else if (operation === '-' && num2 < 0) {
				displayOp = '+';
				displayNum2 = Math.abs(num2);
			}

			const getSymbol = (op) => {
				if (op === '*') return '×';
				if (op === '/') return '÷';
				if (op === '-') return '−';
				return '+';
			};

			return (
				<div className="flex flex-row justify-center items-center gap-4 text-6xl md:text-7xl font-black my-10 text-slate-700 tracking-tighter" dir="ltr">
					<span>{num1}</span>
					<span className="text-indigo-500">{getSymbol(displayOp)}</span>
					<span>
						{displayNum2 < 0 ? `(${displayNum2})` : displayNum2}
					</span>
				</div>
			);
		};

		function App() {
			const [problem, setProblem] = useState(null);
			const [userAnswer, setUserAnswer] = useState('');
			const [score, setScore] = useState(0);
			const [gameState, setGameState] = useState('playing');
			const [showSettings, setShowSettings] = useState(false);
			const [enabledOps, setEnabledOps] = useState(['+', '-', '*', '/']);
			const [minRange, setMinRange] = useState('-50');
			const [maxRange, setMaxRange] = useState('50');
			const [useCounter, setUseCounter] = useState(false);

			const inputRef = useRef(null);
			const nextBtnRef = useRef(null);

			const getParsedRanges = () => {
				let min = parseInt(minRange, 10);
				let max = parseInt(maxRange, 10);
				if (isNaN(min)) min = -50;
				if (isNaN(max)) max = 50;
				return { min, max };
			};

			useEffect(() => {
				const { min, max } = getParsedRanges();
				setProblem(generateProblem(enabledOps, min, max));
			}, []);

			useEffect(() => {
				if (!showSettings) {
					if (gameState === 'playing' && inputRef.current) {
						inputRef.current.focus();
					} else if (gameState !== 'playing' && nextBtnRef.current) {
						nextBtnRef.current.focus();
					}
				}
			}, [gameState, problem, showSettings]);

			const handleSubmit = (e) => {
				e.preventDefault();
				if (gameState !== 'playing' || userAnswer.trim() === '' || showSettings) return;

				const parsedAnswer = parseInt(userAnswer, 10);
				if (isNaN(parsedAnswer)) return;

				if (parsedAnswer === problem.correctAnswer) {
					setScore(s => s + 1);
					setGameState('correct');
				} else {
					setScore(s => s - 1);
					setGameState('incorrect');
				}
			};

			const handleNext = (e) => {
				if (e) e.preventDefault();
				if (gameState === 'incorrect') {
					setUserAnswer('');
					setGameState('playing');
				} else {
					const { min, max } = getParsedRanges();
					setProblem(generateProblem(enabledOps, min, max));
					setUserAnswer('');
					setGameState('playing');
				}
			};

			const toggleOp = (op) => {
				setEnabledOps(prev => {
					if (prev.includes(op)) {
						if (prev.length === 1) return prev;
						return prev.filter(o => o !== op);
					}
					return [...prev, op];
				});
			};

			if (!problem) return null;

			const isPlaying = gameState === 'playing';
			const isCorrect = gameState === 'correct';
			const isIncorrect = gameState === 'incorrect';

			return (
				<div className="min-h-screen bg-gradient-to-br from-indigo-200 via-purple-200 to-pink-200 flex flex-col items-center justify-center p-4 font-sans text-slate-800" dir="rtl">

					{showSettings && (
						<div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-in fade-in" dir="rtl">
							<div className="bg-white rounded-3xl shadow-2xl p-8 max-w-sm w-full border-4 border-white animate-in zoom-in">
								<div className="flex justify-between items-center mb-6">
									<h2 className="text-2xl font-black text-indigo-600">הגדרות</h2>
									<button onClick={() => setShowSettings(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
										<X size={24} />
									</button>
								</div>

								<p className="font-bold text-slate-600 mb-4">בחר פעולות חשבון:</p>
								<div className="grid grid-cols-2 gap-4 mb-6">
									{[
										{ id: '+', label: 'חיבור' },
										{ id: '-', label: 'חיסור' },
										{ id: '*', label: 'כפל' },
										{ id: '/', label: 'חילוק' }
									].map(op => (
										<button
											key={op.id}
											onClick={() => toggleOp(op.id)}
											className={`py-3 px-4 rounded-xl font-bold border-2 transition-all ${enabledOps.includes(op.id)
													? 'bg-indigo-600 border-indigo-600 text-white shadow-md'
													: 'bg-white border-slate-200 text-slate-400 hover:border-indigo-300'
												}`}
										>
											{op.label}
										</button>
									))}
								</div>

								<p className="font-bold text-slate-600 mb-4 pt-4 border-t border-slate-100">טווח מספרים:</p>
								<div className="flex gap-4 mb-8">
									<div className="flex-1">
										<label className="block text-sm text-slate-500 mb-2 font-medium">מינימום</label>
										<input
											type="number"
											value={minRange}
											onChange={(e) => setMinRange(e.target.value)}
											className="w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-center font-bold text-slate-700 focus:border-indigo-500 outline-none transition-colors"
											dir="ltr"
										/>
									</div>
									<div className="flex-1">
										<label className="block text-sm text-slate-500 mb-2 font-medium">מקסימום</label>
										<input
											type="number"
											value={maxRange}
											onChange={(e) => setMaxRange(e.target.value)}
											className="w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-center font-bold text-slate-700 focus:border-indigo-500 outline-none transition-colors"
											dir="ltr"
										/>
									</div>
								</div>

								<div className="flex items-center justify-between mb-8 pt-4 border-t border-slate-100">
									<span className="font-bold text-slate-600">מצב מונה (כפתורי +/-):</span>
									<button
										onClick={() => setUseCounter(!useCounter)}
										className={`w-14 h-8 rounded-full transition-colors relative ${useCounter ? 'bg-indigo-600' : 'bg-slate-300'}`}
									>
										<div className={`absolute top-1 w-6 h-6 bg-white rounded-full transition-all ${useCounter ? 'right-7' : 'right-1'}`} />
									</button>
								</div>

								<button
									onClick={() => {
										setShowSettings(false);
										handleNext();
									}}
									className="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl hover:bg-slate-900 transition-all"
								>
									שמור וסגור
								</button>
							</div>
						</div>
					)}

					<div className="bg-white/90 backdrop-blur-md shadow-2xl rounded-3xl p-8 max-w-md w-full border-4 border-white relative">

						<button
							onClick={() => setShowSettings(true)}
							className="absolute top-8 left-8 p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-all"
							title="הגדרות"
						>
							<Settings size={24} />
						</button>

						<div className="flex justify-center items-center mb-8 border-b-2 border-slate-100 pb-4">
							<div className="flex items-center gap-2 text-indigo-600">
								<Calculator size={28} className="drop-shadow-sm" />
								<h1 className="text-2xl font-black tracking-tight">אתגר החשבון</h1>
							</div>
						</div>

						<div className="flex justify-center mb-6">
							<div className={`flex items-center gap-2 px-6 py-2 rounded-xl font-bold text-xl shadow-inner ${score < 0 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'}`}>
								<Trophy size={24} />
								<span dir="ltr">{score}</span>
							</div>
						</div>

						<ProblemDisplay
							num1={problem.num1}
							num2={problem.num2}
							operation={problem.operation}
						/>

						<form onSubmit={isPlaying ? handleSubmit : handleNext} className="space-y-6">
							<div className="relative">
								{useCounter && isPlaying ? (
									<div className="flex items-center justify-between gap-4">

										<button
											type="button"
											onClick={() => {
												const val = parseInt(userAnswer || '0', 10);
												setUserAnswer((val + 1).toString());
											}}
											className="w-16 h-16 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center hover:bg-green-200 transition-colors active:scale-90"
										>
											<span className="text-4xl font-black">+</span>
										</button>

										<div className="flex-1 text-center text-5xl font-bold py-4 rounded-2xl border-4 border-indigo-200 bg-white" dir="ltr">
											{userAnswer || '0'}
										</div>

										<button
											type="button"
											onClick={() => {
												const val = parseInt(userAnswer || '0', 10);
												setUserAnswer((val - 1).toString());
											}}
											className="w-16 h-16 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center hover:bg-red-200 transition-colors active:scale-90"
										>
											<span className="text-4xl font-black">−</span>
										</button>
									</div>
								) : (
									<input
										ref={inputRef}
										type="number"
										value={userAnswer}
										onChange={(e) => setUserAnswer(e.target.value)}
										disabled={!isPlaying || showSettings}
										className={`w-full text-center text-5xl font-bold py-4 rounded-2xl border-4 transition-all outline-none
                      ${isPlaying
												? 'border-indigo-200 focus:border-indigo-500 bg-white'
												: isCorrect
													? 'border-green-400 bg-green-50 text-green-700'
													: 'border-red-400 bg-red-50 text-red-700'
											}
                    `}
										dir="ltr"
										autoFocus
									/>
								)}
							</div>

							{!isPlaying && (
								<div className={`flex flex-col items-center justify-center p-4 rounded-xl animate-in zoom-in ${isCorrect ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
									<div className="flex items-center gap-2 font-bold text-xl mb-1">
										{isCorrect ? <CheckCircle2 size={24} /> : <XCircle size={24} />}
										<span>{isCorrect ? 'כל הכבוד!' : 'אופס, לא בדיוק...'}</span>
									</div>
									{isIncorrect && (
										<p className="text-lg font-medium opacity-90 text-center">
											נסו לפתור שוב! <br /> הציון ירד בנקודה אחת.
										</p>
									)}
								</div>
							)}

							{isPlaying ? (
								<button
									type="submit"
									disabled={userAnswer.trim() === '' || showSettings}
									className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 disabled:cursor-not-allowed text-white font-bold text-xl py-4 rounded-2xl shadow-lg hover:shadow-xl transition-all active:scale-95 flex justify-center items-center gap-2"
								>
									בדיקת תשובה
								</button>
							) : (
								<button
									ref={nextBtnRef}
									type="submit"
									disabled={showSettings}
									className={`w-full text-white font-bold text-xl py-4 rounded-2xl shadow-lg hover:shadow-xl transition-all active:scale-95 flex justify-center items-center gap-2 ${isCorrect ? 'bg-slate-800 hover:bg-slate-900' : 'bg-red-500 hover:bg-red-600'}`}
								>
									{isCorrect ? (
										<React.Fragment>תרגיל הבא <ArrowLeft size={24} /></React.Fragment>
									) : (
										<React.Fragment>לנסות שוב</React.Fragment>
									)}
								</button>
							)}
						</form>
					</div>
				</div>
			);
		}

		const root = ReactDOM.createRoot(document.getElementById('root'));
		root.render(<App />);
	</script>
</body>

</html>
